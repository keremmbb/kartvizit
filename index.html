<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görkem Yağız YAŞIK - Dijital Kartvizit</title>
    <style>
        :root {
            --primary-blue: #2E3192; 
            --whatsapp-green: #25D366;
            --phone-blue: #007AFF;
            --email-orange: #FF9500;
            --text-dark: #333;
            --bg-light: #f4f7f9;
        }

        /* Giriş Efekti */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f4f7f9 0%, #e1e5ea 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            width: 90%;
            max-width: 380px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            margin: 20px 0;
            animation: fadeInUp 0.8s ease-out forwards;
            /* Kartın genel geçiş efekti */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }

        /* Kartın üzerine gelince hafifçe yükselmesi */
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .header {
            background-color: var(--primary-blue);
            padding: 40px 20px;
            color: white;
            position: relative;
        }
        
        .company-name { font-weight: bold; letter-spacing: 2px; margin-bottom: 10px; font-size: 20px; }
        .user-name { font-size: 26px; margin: 15px 0 5px 0; }
        .title { font-style: italic; opacity: 0.9; font-size: 16px; }
        
        .content { padding: 30px 20px; }
        
        .info-row { 
            display: flex;
            align-items: flex-start;
            text-align: left;
            margin-bottom: 20px; 
            color: var(--text-dark); 
            font-size: 14px; 
            line-height: 1.4;
            gap: 12px;
            padding: 8px;
            border-radius: 10px;
            transition: background 0.3s ease;
        }

        /* Adres satırına hover efekti */
        .info-row:hover {
            background-color: #f8f9fa;
        }

        .svg-icon {
            width: 20px;
            height: 20px;
            fill: var(--primary-blue);
            flex-shrink: 0;
        }
        
        .actions { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: white;
            /* Akıcı animasyon için transition */
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn svg { 
            fill: white; 
            width: 22px; 
            height: 22px; 
            transition: transform 0.3s ease;
        }
        
        /* HOVER (Üstüne gelme) EFEKTLERİ */
        .btn:hover {
            transform: scale(1.05); /* %5 büyüme */
            filter: brightness(1.1); /* Rengi hafif açar */
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }

        /* Hover durumunda ikonu hareketlendir */
        .btn:hover svg {
            transform: rotate(-10deg) scale(1.1);
        }

        /* Tıklama anı (Active) efekti */
        .btn:active {
            transform: scale(0.96);
        }

        .btn-save { background-color: var(--primary-blue); }
        .btn-whatsapp { background-color: var(--whatsapp-green); }
        .btn-call { background-color: var(--phone-blue); }
        .btn-mail { background-color: var(--email-orange); }
        
        .footer-logo { margin-top: 20px; font-size: 11px; color: #999; }
    </style>
</head>
<body>

                  "ADR;TYPE=WORK:;;Rasimpaşa Mah. Nemlizade Sk. No:2 K:1 D:2;Kadıköy;İSTANBUL;;\n" +
                  "END:VCARD";

    const blob = new Blob([vcard], { type: "text/vcard" });
    const url = window.URL.createObjectURL(blob);
    const newLink = document.createElement("a");
    newLink.href = url;
    newLink.setAttribute("download", "GorkemYagizYASIK.vcf");
    document.body.appendChild(newLink);
    newLink.click();
    document.body.removeChild(newLink);
}
